name: live-record

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Module to render live"
        required: true
        default: "calc-cli"

jobs:
  record:
    runs-on: ubuntu-latest
    env:
      MINT_LIVE: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev,live]"
      - name: Refuse missing API key
        run: test -n "$ANTHROPIC_API_KEY"
      - name: Live render and record cassettes
        run: mint live-smoke "${{ inputs.module }}"
